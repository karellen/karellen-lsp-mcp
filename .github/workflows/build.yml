name: karellen-lsp-mcp
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - '3.14'
          - '3.13'
          - '3.12'
          - '3.11'
          - '3.10'
        clangd-version:
          - '22'
        include:
          - os: ubuntu-latest
            python-version: '3.14'
            clangd-version: '18'
          - os: ubuntu-latest
            python-version: '3.14'
            clangd-version: '19'
          - os: ubuntu-latest
            python-version: '3.14'
            clangd-version: '20'
          - os: ubuntu-latest
            python-version: '3.14'
            clangd-version: '21'
    env:
      DEPLOY_PYTHONS: "3.14"
      DEPLOY_OSES: "Linux"
      DEPLOY_CLANGD: "22"
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: pybuilder/build@master
        with:
          python-version: ${{ matrix.python-version }}
          is-upload: >-
            ${{ github.event_name == 'push'
            && contains(env.DEPLOY_OSES, runner.os)
            && contains(env.DEPLOY_PYTHONS, matrix.python-version)
            && contains(env.DEPLOY_CLANGD, matrix.clangd-version) }}
          pre-build: |
            pip install --pre "karellen-llvm-clang>=${{ matrix.clangd-version }},<$(( ${{ matrix.clangd-version }} + 1 ))"
            python -c pass
            clangd --version
  build-summary:
    if: success() || failure()
    runs-on: ubuntu-latest
    name: Build Summary
    needs: build
    steps:
      - name: Check build matrix status
        if: needs.build.result != 'success'
        run: exit 1
